name: solace
version: 16.3.0+276
publish_to: none
description: Solace - AI 陪伴应用，多角色聊天、语音回复、心情日记、从回忆创建角色。纯本地存储，隐私安全。

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  http: ^1.1.0
  uuid: ^4.2.1
  intl: ^0.18.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.3.2
  json_annotation: ^4.8.1
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  image: ^4.0.17
  url_launcher: ^6.2.0
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  workmanager: ^0.9.0
  open_file: ^3.3.2
  crypto: ^3.0.3
  encrypt: ^5.0.3
  web_socket_channel: ^3.0.3
  audioplayers: ^6.1.0
  speech_to_text: ^7.0.0
  record: ^6.2.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0
  flutter_remix: ^0.0.3
  hive_flutter: ^1.1.0
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.0
  bloc_test: ^9.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/stickers/default_pack/
    - assets/stickers/default_pack/metadata.json
    - assets/sky.mp3
  fonts:
    - family: TwitterIcon
      fonts:
        - asset: assets/fonts/twitter_icons.ttf

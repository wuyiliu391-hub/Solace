<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>参考图预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
    h1 { text-align: center; margin-bottom: 20px; font-size: 18px; }
    .container { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; }
    .img-box { text-align: center; }
    .img-box img { max-height: 85vh; border: 2px solid #333; border-radius: 12px; }
    .img-box p { margin-top: 10px; font-size: 14px; color: #aaa; }
  </style>
</head>
<body>
  <h1>抖音参考截图 — 我页面 &amp; 聊天页面</h1>
  <div class="container">
    <div class="img-box">
      <img src="preview_1.png" alt="截图1" />
      <p>截图 1</p>
    </div>
    <div class="img-box">
      <img src="preview_2.png" alt="截图2" />
      <p>截图 2</p>
    </div>
  </div>
</body>
</html>
